name: Generar articulo semanal
# v3: GitHub Models API (gpt-4o-mini)
on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generar articulo con GitHub Models API
        run: |
          pip install requests
          python generar_articulo_gha.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git commit -m "Articulo semanal automatico $(date +%Y-%m-%d)" || echo "No changes"
          git push